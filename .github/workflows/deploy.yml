name: Deploy to GitHub Pages

# 触发条件：题库源文件、源码、依赖变化时自动重建部署
# 效果：Claudian 更新 md → 你 commit md 副本 → 三端 App 打开自动拉到新题库
on:
  push:
    branches: [main]
    paths:
      - 'source/**'
      - 'src/**'
      - 'scripts/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/quiz-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/quiz-app/package-lock.json
      - run: npm ci
      - run: npm run parse
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/quiz-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
